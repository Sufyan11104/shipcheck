name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go test ./...
      - run: go build ./cmd/good-service
      - run: terraform fmt -check -recursive terraform
      - run: terraform validate
      - run: echo "deployment checks complete"
