name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - run: go test ./...
      - run: go vet ./...
      - run: go build -o /tmp/shipcheck ./cmd/shipcheck
      - run: go run ./cmd/shipcheck audit . --category repo,env,ci --fail-under 70
      - run: go run ./cmd/shipcheck audit examples/good-service --fail-under 90
      - run: go run ./cmd/shipcheck audit examples/risky-service --format json
